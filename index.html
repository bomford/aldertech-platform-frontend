<!DOCTYPE html>
<html>
<head>
  <title>Alder Technology Platform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    button {
      margin-right: 10px;
      padding: 8px 12px;
    }
    pre {
      background: #f4f4f4;
      padding: 10px;
      border-radius: 5px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>Alder Technology Platform</h1>

<button onclick="login()">Login</button>
<button onclick="getUser()">Get User Info</button>
<button onclick="callApi()">Call API</button>

<h3>Output:</h3>
<pre id="output">No data yet</pre>

<script>

// 🔐 Login
function login() {
  window.location.href = "/.auth/login/aad";
}

// 👤 Show logged in user
async function getUser() {
  try {
    const res = await fetch("/.auth/me");
    const data = await res.json();

    document.getElementById("output").innerText =
      "✅ Logged in user:\n\n" + JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "❌ Failed to get user:\n" + err;
  }
}

// 🔗 Call backend API (FIXED)
async function callApi() {
  try {
    const response = await fetch("/api/test", {
      method: "GET",
      credentials: "include"
    });

    if (!response.ok) {
      throw new Error(`API returned status ${response.status}`);
    }

    const data = await response.json();

    document.getElementById("output").innerText =
      "✅ API Response:\n\n" + JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "❌ API call failed:\n" + err;
  }
}

</script>

</body>
</html>
