<!DOCTYPE html>
<html>
<head>
  <title>Alder Technology Platform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    button {
      margin-right: 10px;
      padding: 8px 12px;
    }
    pre {
      background: #f4f4f4;
      padding: 10px;
      border-radius: 5px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>Alder Technology Platform</h1>

<button onclick="login()">Login</button>
<button onclick="getUser()">Get User Info</button>
<button onclick="callApi()">Call API</button>

<h3>Output:</h3>
<pre id="output">No data yet</pre>

<script>

// 🔐 Trigger login via Azure Static Web App auth
function login() {
  window.location.href = "/.auth/login/aad";
}

// 👤 Get user identity from Static Web Apps auth
async function getUser() {
  try {
    const res = await fetch("/.auth/me");
    const data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
  } catch (err) {
    document.getElementById("output").innerText = "Error getting user: " + err;
  }
}

// 🔗 Call your backend API via SWA proxy
async function callApi() {
  try {
    const response = await fetch("/api/", {
      method: "GET",
      credentials: "include"
    });

    const text = await response.text();

    document.getElementById("output").innerText = text;
  } catch (err) {
    document.getElementById("output").innerText = "API call failed: " + err;
  }
}

</script>
 
</body>
</html>
