<!DOCTYPE html>
<html>
<head>
  <title>Alder Technology Auth Test</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f4f6f8;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 16px;
      margin-right: 10px;
      margin-bottom: 10px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #005ea6;
    }

    #output {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      white-space: pre-wrap;
      font-family: monospace;
    }
  </style>
</head>

<body>

<h2>Alder Technology Auth Test (Simple Mode)</h2>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="checkUser()">Check User (.auth/me)</button>
<button onclick="callApi()">Call API</button>

<div id="output">No data yet</div>

<script>

// ✅ LOGIN
function login() {
  window.location.href = "/.auth/login/aad";
}

// ✅ LOGOUT
function logout() {
  window.location.href = "/.auth/logout";
}

// ✅ CHECK USER
async function checkUser() {
  const output = document.getElementById("output");

  try {
    const res = await fetch("/.auth/me");
    const text = await res.text();

    output.textContent = "User Info:\n\n" + text;

  } catch (err) {
    output.textContent = "ERROR:\n" + err;
  }
}

// ✅ ✅ FIXED API CALL (IMPORTANT CHANGE)
async function callApi() {
  const output = document.getElementById("output");

  try {
    const res = await fetch(
      "https://app-aldertech-platform-api-a9ayaucgerezbwfr.australiaeast-01.azurewebsites.net/api/test",
      {
        method: "GET"
      }
    );

    const text = await res.text();

    output.textContent = "API Response:\n\n" + text;

  } catch (err) {
    output.textContent = "API ERROR:\n" + err;
  }
}

</script>

</body>
</html>
