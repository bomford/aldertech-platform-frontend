<!DOCTYPE html>
<html>
<head>
  <title>Alder Technology App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f9fafb;
      color: #333;
    }

    h1 {
      margin-bottom: 20px;
    }

    .button-group {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 16px;
      margin-right: 10px;
      border: none;
      background: #0078d4;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    button:hover {
      background: #005ea6;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      max-width: 800px;
    }

    .status-success {
      color: #107c10;
      font-weight: 600;
    }

    .status-error {
      color: #d13438;
      font-weight: 600;
    }

    .label {
      font-weight: bold;
      margin-top: 10px;
    }

    pre {
      background: #f4f4f4;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>

<body>

<h1>Alder Technology App</h1>

<div class="button-group">
  <button onclick="login()">Login</button>
  <button onclick="getUser()">Get User Info</button>
  <button onclick="callApi()">Call API</button>
</div>

<div class="card">
  <div id="output">
    <p>No data yet.</p>
  </div>
</div>

<script>

// ✅ Unicode icons
const check = "\u2705";
const cross = "\u274C";

// ✅ LOGIN (Simple auth)
function login() {
  window.location.href = "/.auth/login/aad";
}

// ✅ GET USER INFO
async function getUser() {
  const output = document.getElementById("output");

  try {
    const res = await fetch("/.auth/me");
    const data = await res.json();
    const user = data.clientPrincipal;

    if (!user) {
      output.innerHTML = `
        <div class="status-error">Not logged in ${cross}</div>
      `;
      return;
    }

    output.innerHTML = `
      <div class="status-success">Logged in ${check}</div>

      <div class="label">User:</div>
      <div>${user.userDetails}</div>

      <div class="label">Roles:</div>
      <div>${user.userRoles.join(", ")}</div>

      <div class="label">Raw Data:</div>
      <pre>${JSON.stringify(data, null, 2)}</pre>
    `;

  } catch (err) {
    output.innerHTML = `
      <div class="status-error">Failed to load user ${cross}</div>
    `;
  }
}

// ✅ API CALL (robust handling)
async function callApi() {
  const output = document.getElementById("output");

  try {
    const res = await fetch("/api/test", {
      credentials: "include"
    });

    const text = await res.text();

    try {
      const data = JSON.parse(text);

      output.innerHTML = `
        <div class="status-success">API working ${check}</div>

        <div class="label">Message:</div>
        <div>${data.message}</div>

        <div class="label">Full Response:</div>
        <pre>${JSON.stringify(data, null, 2)}</pre>
      `;
    } catch {
      output.innerHTML = `
        <div class="status-error">API returned non-JSON ${cross}</div>
        <pre>${text}</pre>
      `;
    }

  } catch (err) {
    output.innerHTML = `
      <div class="status-error">API call failed ${cross}</div>
      <pre>${err}</pre>
    `;
  }
}

</script>

</body>
</html>
